<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ArchPlan</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>
</head>

<body class="bg-gray-50 text-gray-800">

  <div class="max-w-6xl mx-auto p-6">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-3xl font-semibold">ArchPlan</h1>
      <p class="text-gray-500 text-sm mt-1">
        AI-powered system design generator
      </p>
    </div>

    <!-- Input Card -->
    <div class="bg-white rounded-xl shadow-sm border p-5 mb-6">
      <textarea id="query"
        class="w-full p-3 border rounded-md mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
        rows="3"
        placeholder="Design a food delivery platform..."></textarea>

      <button onclick="generate()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-md text-sm">
        Generate
      </button>
    </div>

    <!-- Content Grid -->
    <div class="grid md:grid-cols-2 gap-6">

      <!-- Components -->
      <div class="bg-white rounded-xl shadow-sm border p-5">
        <h2 class="font-semibold text-lg mb-3">Components</h2>
        <ul id="components" class="space-y-2 text-sm"></ul>
      </div>

      <!-- Architecture + Scaling -->
      <div class="bg-white rounded-xl shadow-sm border p-5">
        <h2 class="font-semibold text-lg mb-2">Architecture</h2>
        <p id="architecture" class="text-sm text-gray-600 mb-4"></p>

        <h2 class="font-semibold text-lg mb-2">Scaling</h2>
        <p id="scaling" class="text-sm text-gray-600"></p>
      </div>

    </div>

    <!-- Diagram -->
    <div class="bg-white rounded-xl shadow-sm border p-5 mt-6">
      <h2 class="font-semibold text-lg mb-3">System Diagram</h2>
      <div id="diagram" class="overflow-x-auto"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
