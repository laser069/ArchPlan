<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchPlan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .diagram-glow { box-shadow: 0 0 0 2px #f59e0b; }
  </style>

  <script>
    mermaid.initialize({ 
      startOnLoad: false, 
      theme: 'base',
      themeVariables: {
        primaryColor: '#f8fafc',
        primaryTextColor: '#1e293b',
        primaryBorderColor: '#6366f1', // Indigo
        lineColor: '#94a3b8',
        secondaryColor: '#ffffff',
        tertiaryColor: '#f1f5f9'
      }
    });
  </script>
</head>

<body class="text-slate-900">

  <header class="border-b border-slate-200 bg-white">
    <div class="max-w-7xl mx-auto px-6 py-3 flex justify-between items-center">
      <h1 class="text-lg font-bold tracking-tight text-slate-800">ArchPlan</h1>
      <div id="rag-badge" class="hidden px-2 py-0.5 bg-amber-50 text-amber-700 text-[10px] font-bold rounded border border-amber-100 uppercase tracking-wider">
        Context Integrated
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 space-y-6">
    
    <section>
      <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden focus-within:border-indigo-500 transition-all">
        <textarea id="query"
          class="w-full p-5 text-base border-none focus:ring-0 text-slate-700 resize-none"
          rows="3"
          placeholder="Enter system requirements..."></textarea>
        
        <div class="px-5 py-3 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
          <div class="flex items-center gap-2">
            <button id="gen-btn" onclick="generate(false)"
              class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-semibold transition-all active:scale-95 disabled:opacity-50">
              Generate
            </button>
            <button id="update-btn" onclick="generate(true)" disabled
              class="opacity-50 cursor-not-allowed bg-white border border-slate-200 text-slate-500 px-5 py-2 rounded-lg text-sm font-semibold transition-all active:scale-95">
              Refine
            </button>
          </div>

          <div id="status-spinner" class="hidden flex items-center gap-2 text-xs text-slate-500 font-medium">
            <svg class="animate-spin h-3 w-3 text-indigo-600" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <span id="status-text">Processing...</span>
          </div>

          <button id="reset-btn" onclick="resetState()" class="text-slate-400 hover:text-red-500 text-[10px] font-bold uppercase tracking-wider transition-colors">
            Clear
          </button>
        </div>
      </div>
    </section>

    <section class="grid lg:grid-cols-4 gap-6">
      
      <div class="lg:col-span-1 space-y-4">
        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Components</h2>
          <ul id="components" class="space-y-1.5">
            <li class="text-slate-400 italic text-xs">Empty</li>
          </ul>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Narrative</h2>
          <div class="space-y-4">
            <div>
              <h3 class="text-xs font-bold text-slate-800 mb-1">Architecture</h3>
              <p id="architecture" class="text-xs text-slate-500 leading-relaxed italic">...</p>
            </div>
            <div>
              <h3 class="text-xs font-bold text-slate-800 mb-1">Scaling</h3>
              <p id="scaling" class="text-xs text-slate-500 leading-relaxed italic">...</p>
            </div>
          </div>
        </div>
      </div>

      <div class="lg:col-span-3">
        <div class="bg-white rounded-xl border border-slate-200 p-5 h-full min-h-[550px] flex flex-col">
          <div class="flex items-center justify-between mb-4 border-b border-slate-50 pb-2">
            <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Diagram Output</h2>
            <span class="text-[9px] mono text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">SVG Render</span>
          </div>
          <div id="diagram" class="flex-grow flex justify-center items-center bg-[#fdfdfd] rounded-lg border border-slate-100 overflow-auto p-4 transition-all duration-300">
            <p class="text-slate-300 text-xs">No diagram generated</p>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
