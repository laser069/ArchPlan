<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchPlan | AI System Architecture</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link rel="stylesheet" href="index.css">
    <script>mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });</script>
</head>
<body class="bg-[#FAFAFA] text-[#111111] selection:bg-black selection:text-white">

<header class="border-b border-black/5 bg-white/80 sticky top-0 z-50 backdrop-blur-md">
    <div class="max-w-[1600px] mx-auto px-8 py-4 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <h1 class="text-xs font-black uppercase tracking-[0.25em]">ArchPlan</h1>
            
            <div class="flex items-center gap-4 border-l border-black/10 pl-8">
                <select id="provider-select"
                    class="mono text-[10px] bg-transparent uppercase cursor-pointer hover:opacity-50 outline-none">
                    <option value="groq">Groq</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="gemini">Gemini</option>
                    <option value="ollama">Ollama</option>
                </select>

                <input id="model-input" type="text" 
                    placeholder="MODEL ID" 
                    class="mono text-[10px] bg-transparent border-b border-black/10 focus:border-black outline-none w-48 pb-0.5 transition-all" />
            </div>
        </div>

        <div id="status-bar" class="hidden flex items-center gap-3">
            <div class="h-1.5 w-1.5 bg-black animate-pulse"></div>
            <span id="status-text" class="mono text-[9px] uppercase tracking-widest">Processing</span>
        </div>
    </div>
</header>

<main class="max-w-[1600px] mx-auto p-8 grid grid-cols-12 gap-8">
    <aside class="col-span-12 lg:col-span-3 space-y-8">
        <div class="space-y-4">
            <label class="card-label">Requirements</label>
            <textarea id="query" rows="8" 
                placeholder="Describe your system architecture..."
                class="w-full bg-white border border-black/10 p-4 text-sm focus:border-black outline-none transition-all resize-none"></textarea>
            
            <div class="flex flex-col gap-2">
                <button id="gen-btn" onclick="generate(false)" 
                    class="bg-black text-white text-[10px] font-bold uppercase tracking-[0.15em] py-4 hover:bg-zinc-800 transition-all active:scale-[0.98]">
                    Generate Architecture
                </button>
                <button id="upd-btn" onclick="generate(true)" disabled
                    class="border border-black/10 text-black text-[10px] font-bold uppercase tracking-[0.15em] py-4 disabled:opacity-20 hover:bg-black hover:text-white transition-all">
                    Refine Design
                </button>
            </div>
        </div>

        <div class="pt-8 border-t border-black/5">
            <span class="card-label">Components</span>
            <ul id="components" class="space-y-1">
                <li class="mono text-[10px] opacity-30 italic">No components detected</li>
            </ul>
        </div>
    </aside>

    <section class="col-span-12 lg:col-span-6">
        <div id="diagram-container" class="bg-white border border-black/10 flex flex-col min-h-[750px] relative shadow-[4px_4px_0px_0px_rgba(0,0,0,0.02)] transition-all">
            <div class="flex justify-between items-center p-4 border-b border-black/[0.03] bg-zinc-50/50">
                <span class="mono text-[9px] uppercase tracking-widest opacity-50">Diagram</span>
                <button onclick="copyDiagram()" class="mono text-[9px] text-black font-bold uppercase hover:underline tracking-widest">Copy Source</button>
            </div>
            
            <div id="diagram" class="flex-1 flex items-center justify-center p-10 overflow-auto">
                <p class="mono text-[10px] opacity-20 uppercase tracking-widest italic text-center">
                    Awaiting input
                </p>
            </div>
        </div>
    </section>

    <aside class="col-span-12 lg:col-span-3 space-y-8">
        <div>
            <span class="card-label">Rationale</span>
            <p id="architecture" class="text-xs leading-relaxed opacity-70 card-content empty">Awaiting generation</p>
        </div>
        
        <div class="pt-8 border-t border-black/5">
            <span class="card-label">Scaling Strategy</span>
            <p id="scaling" class="text-xs leading-relaxed opacity-70 card-content empty">Awaiting generation</p>
        </div>

        <div class="pt-8 border-t border-black/5">
            <button onclick="resetState()" class="mono text-[9px] text-black/30 hover:text-red-600 font-bold uppercase tracking-[0.2em] transition-all">
                Reset Workspace
            </button>
        </div>
    </aside>
</main>

<script src="script.js"></script>
</body>
</html>
