<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchPlan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8f8fa; }
    .mono { font-family: ui-monospace, monospace; }
    .refining { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
  </style>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });</script>
</head>
<body class="text-slate-900">

<header class="border-b border-slate-200 bg-white sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-4">
    <h1 class="text-base font-bold tracking-tight">ArchPlan</h1>
    <select id="provider-select" onchange="localStorage.setItem('archplan_provider', this.value)"
      class="mono text-[10px] border border-slate-200 rounded px-2 py-1 text-slate-500 bg-slate-50 uppercase outline-none focus:border-indigo-400">
      <option value="gemini">Gemini</option>
      <option value="ollama">Ollama (local)</option>
    </select>
    <div id="status-bar" class="hidden ml-auto flex items-center gap-2 text-xs text-slate-400">
      <svg id="spinner" class="animate-spin h-3 w-3 text-indigo-500" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
        <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span id="status-text">Thinking...</span>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-4">

  <div class="bg-white rounded-xl border border-slate-200 overflow-hidden focus-within:border-indigo-400 transition-colors">
    <textarea id="query" rows="3" placeholder="e.g., Design a real-time fleet tracking system for 500 trucks..."
      class="w-full p-4 text-sm text-slate-700 border-none focus:ring-0 resize-none"></textarea>
    <div class="px-4 py-2.5 bg-slate-50 border-t border-slate-100 flex items-center gap-2">
      <button id="gen-btn" onclick="generate(false)" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-1.5 rounded-lg font-medium transition-colors active:scale-95">Generate</button>
      <button id="upd-btn" onclick="generate(true)" disabled
        class="opacity-40 cursor-not-allowed border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-lg font-medium transition-all">Refine</button>
      <button onclick="resetState()" class="ml-auto text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase tracking-wider transition-colors">Reset</button>
    </div>
  </div>

  <div class="grid lg:grid-cols-4 gap-4">
    <div class="space-y-4">
      <div class="bg-white rounded-xl border border-slate-200 p-4">
        <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-3">Components</p>
        <ul id="components" class="space-y-1.5">
          <li class="text-[11px] text-slate-300 italic">Awaiting generation...</li>
        </ul>
      </div>
      <div class="bg-white rounded-xl border border-slate-200 p-4 space-y-3">
        <div>
          <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-1">Design strategy</p>
          <p id="architecture" class="text-xs text-slate-400 leading-relaxed italic">Pattern rationale appears here.</p>
        </div>
        <div>
          <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-1">Scaling plan</p>
          <p id="scaling" class="text-xs text-slate-400 leading-relaxed italic">Peak load strategy appears here.</p>
        </div>
      </div>
    </div>

    <div class="lg:col-span-3">
      <div id="diagram-container" class="bg-white rounded-xl border border-slate-200 p-4 min-h-[580px] flex flex-col transition-all duration-200">
        <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-3">Live preview</p>
        <div id="diagram" class="flex-1 flex justify-center items-center bg-slate-50 rounded-lg border border-slate-100 overflow-auto p-4">
          <p class="text-xs text-slate-300">Enter a prompt to visualize your architecture.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
