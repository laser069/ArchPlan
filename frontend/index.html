<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchPlan | AI Architect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #f8f8fa; }
    .mono { font-family: ui-monospace, monospace; }
    .refining { border-color: #6366f1 !important; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    /* Smooth transition for diagram updates */
    #diagram svg { max-width: 100%; height: auto; transition: all 0.3s ease; }
  </style>
  <script>mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });</script>
</head>
<body class="text-slate-900">

<header class="border-b border-slate-200 bg-white sticky top-0 z-10">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center gap-4">
    <h1 class="text-base font-bold tracking-tight text-indigo-600">ArchPlan</h1>
    
    <select id="provider-select" onchange="localStorage.setItem('ap_provider', this.value)"
      class="mono text-[10px] border border-slate-200 rounded px-2 py-1 text-slate-500 bg-slate-50 uppercase outline-none focus:border-indigo-400 cursor-pointer">
      <option value="groq" selected>Groq (Llama 70B)</option>
      <option value="gemini">Gemini Flash</option>
      <option value="ollama">Ollama (Local)</option>
    </select>

    <div id="status-bar" class="hidden ml-auto flex items-center gap-2 text-xs text-slate-400">
      <svg id="spinner" class="animate-spin h-3 w-3 text-indigo-500" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" class="opacity-25"/>
        <path fill="currentColor" class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span id="status-text">Thinking...</span>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-4">
  <div class="bg-white rounded-xl border border-slate-200 overflow-hidden focus-within:border-indigo-400 transition-colors shadow-sm">
    <textarea id="query" rows="3" placeholder="Describe your system (e.g., A high-throughput image processing pipeline using S3 and Lambda)..."
      class="w-full p-4 text-sm text-slate-700 border-none focus:ring-0 resize-none"></textarea>
    <div class="px-4 py-2.5 bg-slate-50 border-t border-slate-100 flex items-center gap-2">
      <button id="gen-btn" onclick="generate(false)" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-1.5 rounded-lg font-medium transition-all active:scale-95 shadow-sm">Generate</button>
      <button id="upd-btn" onclick="generate(true)" disabled
        class="opacity-40 cursor-not-allowed border border-slate-200 text-slate-500 text-sm px-4 py-1.5 rounded-lg font-medium transition-all bg-white hover:bg-slate-50">Refine</button>
      <button onclick="resetState()" class="ml-auto text-[10px] text-slate-400 hover:text-red-500 font-bold uppercase tracking-wider transition-colors">Reset Workspace</button>
    </div>
  </div>

  <div class="grid lg:grid-cols-4 gap-4">
    <div class="space-y-4">
      <div class="bg-white rounded-xl border border-slate-200 p-4 shadow-sm">
        <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-3">Detected Components</p>
        <ul id="components" class="space-y-1.5">
          <li class="text-[11px] text-slate-300 italic">No components yet...</li>
        </ul>
      </div>

      <div class="bg-white rounded-xl border border-slate-200 p-4 space-y-4 shadow-sm">
        <div>
          <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-1">Architecture Rationale</p>
          <p id="architecture" class="text-[12px] text-slate-400 leading-relaxed italic">Awaiting design logic...</p>
        </div>
        <hr class="border-slate-100">
        <div>
          <p class="mono text-[10px] text-slate-400 uppercase tracking-widest mb-1">Scaling Strategy</p>
          <p id="scaling" class="text-[12px] text-slate-400 leading-relaxed italic">Awaiting scaling plan...</p>
        </div>
      </div>
    </div>

    <div class="lg:col-span-3">
      <div id="diagram-container" class="bg-white rounded-xl border border-slate-200 p-4 min-h-[600px] flex flex-col transition-all duration-200 shadow-sm">
        <div class="flex justify-between items-center mb-3">
            <p class="mono text-[10px] text-slate-400 uppercase tracking-widest">System Diagram (Mermaid)</p>
            <button onclick="copyDiagram()" class="text-[10px] text-indigo-500 font-bold uppercase hover:underline">Copy Code</button>
        </div>
        <div id="diagram" class="flex-1 flex justify-center items-center bg-slate-50 rounded-lg border border-slate-100 overflow-auto p-4 transition-colors">
          <p class="text-xs text-slate-300">Submit a prompt to generate a live architecture preview.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
